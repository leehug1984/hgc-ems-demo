<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sơ đồ · HGC Cloud EMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/charts.css">
</head>
<body>
<div class="app-shell">
  <div class="sidebar-scrim"></div>
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="mark"><svg viewBox="0 0 24 24" fill="none"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8Z" fill="white"/></svg></div>

    </div>
    <nav class="sidebar-nav">
      <a href="../dashboard/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>Dashboard</a>
      <a href="../giam-sat/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2 8 4-16 2 8h4"/></svg>Giám sát</a>
      <a href="../so-do/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="2.5"/><circle cx="18" cy="6" r="2.5"/><circle cx="12" cy="18" r="2.5"/><path d="M8 7.5 11 15M16 7.5 13 15"/></svg>Sơ đồ</a>
      <a href="../dieu-khien/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="7" x2="20" y2="7"/><circle cx="9" cy="7" r="2"/><line x1="4" y1="17" x2="20" y2="17"/><circle cx="16" cy="17" r="2"/></svg>Điều khiển</a>
      <a href="../lich-trinh/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>Lịch trình</a>
      <a href="../canh-bao/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9a6 6 0 1 1 12 0c0 5 2 6 2 6H4s2-1 2-6Z"/><path d="M10 20a2 2 0 0 0 4 0"/></svg>Cảnh báo<span class="num">8</span></a>
      <a href="../bao-cao/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3h7l4 4v14H7z"/><path d="M9 12h7M9 16h7M9 8h3"/></svg>Báo cáo</a>
      <a href="../tai-san/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="6" rx="1.5"/><rect x="3" y="14" width="18" height="6" rx="1.5"/><path d="M7 7h.01M7 17h.01"/></svg>Tài sản</a>
      <a href="../xu-huong/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l6-6 4 4 8-9"/><path d="M15 6h6v6"/></svg>Xu hướng</a>
      <a href="../cai-dat/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09A1.7 1.7 0 0 0 9 19.4a1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.6 9a1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.55 1Z"/></svg>Cài đặt</a>
      <a href="../nguoi-dung/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.2"/><path d="M2.5 20c0-3.6 2.9-6 6.5-6s6.5 2.4 6.5 6"/><circle cx="17.5" cy="8.5" r="2.6"/><path d="M15.6 14.3c2.9.4 4.9 2.6 4.9 5.7"/></svg>Người dùng &amp; Phân quyền</a>
    </nav>
    <div class="sidebar-foot">HGC Power · v2.4.1</div>
  </aside>

  <div>
    <header class="topbar">
      <button class="nav-toggle" data-nav-toggle aria-label="Mở menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
      <div class="topbar-title"><h1>Sơ đồ</h1></div>
      <button class="plant-select"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 21h18M6 21V8l6-4 6 4v13M10 21v-6h4v6"/></svg><span>Nhà máy HGC BESS 01</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></button>
      <span class="status-pill good"><span class="dot"></span>Online</span>
      <div class="topbar-spacer"></div>
      <span class="topbar-clock"><strong data-clock>10:30:00</strong></span>
      <button class="icon-btn" aria-label="Thông báo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9a6 6 0 1 1 12 0c0 5 2 6 2 6H4s2-1 2-6Z"/><path d="M10 20a2 2 0 0 0 4 0"/></svg><span class="badge-dot"></span></button>
      <button class="icon-btn" aria-label="Trợ giúp"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 1 1 3.5 2.3c-.9.5-1.5 1-1.5 2.2"/><path d="M12 17h.01"/></svg></button>
      <div class="dropdown">
        <button class="user-chip" data-dropdown-trigger><span class="av">A</span><span>Admin</span><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></button>
        <div class="dropdown-menu">
          <a href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-6 8-6s8 2 8 6"/></svg>Hồ sơ cá nhân</a>
          <a href="../cai-dat/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M4 12h2m12 0h2M12 4v2m0 12v2"/></svg>Cài đặt</a>
          <div class="dropdown-divider"></div>
          <button type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5M21 12H9"/></svg>Đăng xuất</button>
        </div>
      </div>
    </header>

    <main class="content">
      <section class="card">
        <div class="card-head">
          <h2>Sơ đồ một sợi</h2>
          <div class="card-head-spacer"></div>
          <button class="plant-select" style="font-size:var(--text-2xs)">Sơ đồ một sợi<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 9l6 6 6-6"/></svg></button>
          <button class="btn btn-ghost">Tùy chọn</button>
        </div>
        <div class="card-body">
          <div class="diagram-frame chart-frame" style="position:relative;padding:var(--space-md)">
            <svg viewBox="0 0 900 460">
              <text x="450" y="18" text-anchor="middle" class="node-sub" style="font-size:11px">110kV Grid</text>
              <circle cx="450" cy="40" r="13" class="node-box"/>
              <path class="wire" d="M450 34 L444 46 L456 46 Z" style="fill:var(--color-accent-2);stroke:none"/>

              <line class="wire" x1="450" y1="53" x2="450" y2="76"/>
              <circle cx="440" cy="92" r="15" class="node-box"/>
              <circle cx="460" cy="92" r="15" class="node-box"/>
              <text x="480" y="88" class="node-sub">Trạm sạc điện</text>
              <text x="480" y="100" class="node-sub">110/22kV · 40 MVA</text>
              <line class="wire" x1="450" y1="107" x2="450" y2="160"/>

              <line class="bus" x1="120" y1="160" x2="820" y2="160"/>
              <text x="120" y="146" class="node-sub" style="font-size:11px;fill:var(--color-ink-2)">22kV Busbar</text>

              <!-- PV Inverter branch -->
              <line class="wire" x1="180" y1="160" x2="180" y2="196"/>
              <rect x="173" y="196" width="14" height="14" class="breaker" />
              <line class="wire" x1="180" y1="210" x2="180" y2="250"/>
              <g class="dnode"><rect class="node-box" x="115" y="250" width="130" height="60" rx="8"/>
                <circle class="status-on" cx="130" cy="264" r="4"/>
                <text class="node-label" x="142" y="269">PV Inverter</text>
                <text class="node-sub" x="142" y="285">1.25 MW</text>
                <text class="node-sub" x="142" y="299" style="fill:var(--color-good)">Đóng</text>
              </g>

              <!-- PCS 1 branch -->
              <line class="wire" x1="370" y1="160" x2="370" y2="196"/>
              <rect x="363" y="196" width="14" height="14" class="breaker" />
              <line class="wire" x1="370" y1="210" x2="370" y2="250"/>
              <g class="dnode"><rect class="node-box" x="305" y="250" width="130" height="60" rx="8"/>
                <circle class="status-on" cx="320" cy="264" r="4"/>
                <text class="node-label" x="332" y="269">PCS 1</text>
                <text class="node-sub" x="332" y="285">1.25 MW</text>
                <text class="node-sub" x="332" y="299" style="fill:var(--color-good)">Đóng</text>
              </g>

              <!-- PCS 2 branch (breaker in warning) -->
              <line class="wire" x1="560" y1="160" x2="560" y2="196"/>
              <rect x="553" y="196" width="14" height="14" class="breaker" style="fill:var(--color-warning-wash);stroke:var(--color-warning)"/>
              <line class="wire" x1="560" y1="210" x2="560" y2="250"/>
              <g class="dnode"><rect class="node-box" x="495" y="250" width="130" height="60" rx="8" style="stroke:var(--color-warning)"/>
                <circle class="status-alarm" cx="510" cy="264" r="4"/>
                <text class="node-label" x="522" y="269">PCS 2</text>
                <text class="node-sub" x="522" y="285">1.25 MW</text>
                <text class="node-sub" x="522" y="299" style="fill:var(--color-warning)">Cảnh báo</text>
              </g>

              <!-- Tải nhà máy branch -->
              <line class="wire" x1="770" y1="160" x2="770" y2="196"/>
              <rect x="763" y="196" width="14" height="14" class="breaker" />
              <line class="wire" x1="770" y1="210" x2="770" y2="250"/>
              <g class="dnode"><rect class="node-box" x="705" y="250" width="130" height="60" rx="8"/>
                <circle class="status-on" cx="720" cy="264" r="4"/>
                <text class="node-label" x="732" y="269">Tải nhà máy</text>
                <text class="node-sub" x="732" y="285">2.85 MW</text>
                <text class="node-sub" x="732" y="299" style="fill:var(--color-good)">Đóng</text>
              </g>

              <!-- Battery system -->
              <line class="wire" x1="370" y1="310" x2="370" y2="360"/>
              <line class="wire" x1="560" y1="310" x2="560" y2="360"/>
              <g class="dnode"><rect class="node-box" x="335" y="360" width="260" height="60" rx="8" style="fill:var(--color-accent-wash);stroke:var(--color-accent)"/>
                <circle class="status-on" cx="352" cy="374" r="4"/>
                <text class="node-label" x="364" y="379" style="font-weight:600">Battery System</text>
                <text class="node-sub" x="364" y="395">5.02 MWh · SOC 68%</text>
              </g>
            </svg>

            <div class="u-flex u-gap-xs" style="position:absolute;left:24px;bottom:24px">
              <button class="icon-btn" style="background:var(--color-paper-3);border:1px solid var(--color-rule)" aria-label="Phóng to"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg></button>
              <button class="icon-btn" style="background:var(--color-paper-3);border:1px solid var(--color-rule)" aria-label="Thu nhỏ"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/></svg></button>
            </div>

            <div class="card" style="position:absolute;right:24px;bottom:24px;padding:var(--space-sm) var(--space-md)">
              <div style="font-size:var(--text-2xs);color:var(--color-muted);margin-bottom:6px">Chú thích</div>
              <div class="legend" style="flex-direction:column;gap:6px">
                <span class="item"><span class="swatch" style="background:var(--color-good);border-radius:50%"></span>Đóng</span>
                <span class="item"><span class="swatch" style="background:var(--color-muted);border-radius:50%"></span>Mở</span>
                <span class="item"><span class="swatch" style="background:var(--color-warning);border-radius:50%"></span>Cảnh báo</span>
                <span class="item"><span class="swatch" style="background:var(--color-critical);border-radius:50%"></span>Lỗi</span>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
</div>
<script src="../js/app.js"></script>
</body>
</html>
